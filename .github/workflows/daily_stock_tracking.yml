name: 每日港股标的追踪

on:
  schedule:
    # 香港时间 16:30（收盘后）= UTC 08:30
    - cron: '30 8 * * 1-5'
  
  # 允许手动触发
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  track-stocks:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas matplotlib
        
    - name: 运行追踪脚本
      run: |
        cd stock-tracking
        python auto_stock_tracker.py
        
    - name: 提交追踪数据
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add stock-tracking/stock_data/
        git commit -m "📊 更新每日追踪数据 $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push
        
    - name: 上传报告为Artifact
      uses: actions/upload-artifact@v4
      with:
        name: daily-report-${{ github.run_id }}
        path: stock-tracking/stock_data/daily_report.md
        
