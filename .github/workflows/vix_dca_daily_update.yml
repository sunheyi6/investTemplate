name: VIX定投策略每日更新

on:
  schedule:
    # A股收盘 15:00（北京时间）后半小时 -> 15:30 = UTC 07:30
    # 美股VIX数据一般在美股收盘后（北京时间次日5:00左右）更新
    # 但为了用昨日VIX指导今日A股操作，我们在A股收盘后更新当日ETF价格
    # 周一到周五，每天北京时间 15:30 执行（A股收盘后半小时）
    - cron: '30 7 * * 1-5'
    # 补触发：15:40
    - cron: '40 7 * * 1-5'
  
  # 允许手动触发
  workflow_dispatch:
    inputs:
      date:
        description: '指定日期 (YYYY-MM-DD)，默认今天'
        required: false
        default: ''
      vix:
        description: '指定VIX值（可选，默认自动获取）'
        required: false
        default: ''
      price:
        description: '指定ETF价格（可选，默认自动获取）'
        required: false
        default: ''
      force:
        description: '强制更新（即使今天已更新）'
        required: false
        default: 'false'

concurrency:
  # 同一分支同一工作流仅保留一个进行中实例
  group: vix-dca-update-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-vix-dca:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置时区为北京时间
      run: |
        sudo timedatectl set-timezone Asia/Shanghai
        echo "当前时间: $(date '+%Y-%m-%d %H:%M:%S')"

    - name: 检查今日是否已更新
      id: freshness
      run: |
        TODAY_CN=$(date +'%Y-%m-%d')
        STATE_FILE="decision-tracking/vix_dca_strategy/state.json"
        
        # 获取最后更新日期
        LAST_UPDATE=$(jq -r '.account.last_update // empty' "$STATE_FILE" 2>/dev/null || echo "")
        
        if [ "$LAST_UPDATE" = "$TODAY_CN" ] && [ "${{ github.event.inputs.force }}" != "true" ]; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "[INFO] 今日（${TODAY_CN}）VIX策略已更新，跳过。"
          echo "[INFO] 如需强制更新，请使用 workflow_dispatch 并设置 force=true"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "[INFO] 今日（${TODAY_CN}）尚未更新或强制更新，继续执行。"
          if [ "$LAST_UPDATE" != "" ]; then
            echo "[INFO] 最后更新日期: $LAST_UPDATE"
          fi
        fi

    - name: 设置 Python 环境
      if: steps.freshness.outputs.skip != 'true' || github.event.inputs.force == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      if: steps.freshness.outputs.skip != 'true' || github.event.inputs.force == 'true'
      run: |
        python -m pip install --upgrade pip
        pip install akshare yfinance pandas

    - name: 执行VIX策略更新
      if: steps.freshness.outputs.skip != 'true' || github.event.inputs.force == 'true'
      run: |
        # 构建参数
        ARGS=""
        if [ "${{ github.event.inputs.date }}" != "" ]; then
          ARGS="$ARGS --date ${{ github.event.inputs.date }}"
        fi
        if [ "${{ github.event.inputs.vix }}" != "" ]; then
          ARGS="$ARGS --vix ${{ github.event.inputs.vix }}"
        fi
        if [ "${{ github.event.inputs.price }}" != "" ]; then
          ARGS="$ARGS --price ${{ github.event.inputs.price }}"
        fi
        if [ "${{ github.event.inputs.force }}" = "true" ]; then
          ARGS="$ARGS --force"
        fi
        
        echo "执行命令: python scripts/auto_update_vix_dca.py $ARGS"
        python scripts/auto_update_vix_dca.py $ARGS

    - name: 验证更新结果
      if: steps.freshness.outputs.skip != 'true' || github.event.inputs.force == 'true'
      run: |
        TODAY_CN=$(date +'%Y-%m-%d')
        STATE_FILE="decision-tracking/vix_dca_strategy/state.json"
        LAST_UPDATE=$(jq -r '.account.last_update // empty' "$STATE_FILE" 2>/dev/null || echo "")
        
        if [ "$LAST_UPDATE" = "$TODAY_CN" ]; then
          echo "✅ 验证成功: 今日数据已更新 ($TODAY_CN)"
          # 显示今日数据摘要
          echo ""
          echo "=== 今日数据摘要 ==="
          jq -r '.daily_performance | "日期: \(.date), VIX: \(.vix), 当日盈亏: \(.daily_pnl), 累计盈亏: \(.total_pnl)"' "$STATE_FILE"
          jq -r '.position | "持仓: \(.shares)份, 市值: \(.market_value), 收益: \(.unrealized_pnl)元 (\(.return_pct)%)"' "$STATE_FILE"
        else
          echo "⚠️ 验证警告: 最后更新日期为 $LAST_UPDATE，期望 $TODAY_CN"
        fi

    - name: 提交更新
      if: steps.freshness.outputs.skip != 'true' || github.event.inputs.force == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 添加所有相关文件
        git add -A "decision-tracking/vix_dca_strategy/"
        git add -A "08-决策追踪/vix_dca_strategy/"
        git add -A "public/vix_strategy/"
        git add -A "portfolio/vix-dca-strategy.md"
        
        # 提交
        TODAY_CN=$(date +'%Y-%m-%d')
        git commit -m "📊 VIX定投策略更新 $TODAY_CN" || echo "No changes to commit"
        git push
