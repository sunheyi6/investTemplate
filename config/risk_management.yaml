# 风控规则配置（V5.5.13）
# 个股投资风险管理规则

version: "5.5.13"
last_updated: "2026-03-29"

# ==================== 仓位限制 ====================
position_limits:
  纯硬收息型:
    single_stock_max: 0.15    # 单标上限 15%
    single_stock_min: 0.05    # 单标下限 5%
    sector_max: 0.30          # 行业上限 30%（如银行业）
    description: "内银行股等高股息标的"
    
  烟蒂股型:
    single_stock_max: 0.05    # 单标上限 5%（流动性差）
    single_stock_min: 0.02    # 单标下限 2%（太小无意义）
    sector_max: 0.20          # 行业上限 20%
    description: "净现金/市值 > 2倍的极度低估标的"
    
  价值发现型:
    single_stock_max: 0.10    # 单标上限 10%
    single_stock_min: 0.03    # 单标下限 3%
    sector_max: 0.25          # 行业上限 25%
    description: "有成长性的价值股"
    
  关联方资源型:
    single_stock_max: 0.08    # 单标上限 8%
    single_stock_min: 0.02    # 单标下限 2%
    sector_max: 0.15          # 行业上限 15%
    description: "控股平台、母子公司套利"

# ==================== 止损规则 ====================
stop_loss_rules:
  烟蒂股:
    - condition: "兑现概率 < 40%"
      action: "立即卖出"
      reference: "第七章7.5.2"
    - condition: "持有期 > 3年 且 涨幅 < 10%"
      action: "时间止损"
      note: "价值修复不及预期"
    - condition: "基本面恶化"
      indicators:
        - "有息负债激增 > 50%"
        - "现金流失 > 30%"
        - "连续2年不分红"
      action: "立即卖出"
      
  收息型:
    - condition: "股息率 < 3%"
      action: "卖出"
      note: "保底收益消失"
    - condition: "连续2年不分红"
      action: "卖出"
    - condition: "PE > 15 或 PB > 1.5"
      action: "估值过高，考虑卖出"
    - condition: "派息率 > 100% 持续2年"
      action: "卖出"
      note: "派息不可持续"

# ==================== 流动性限制 ====================
liquidity_limits:
  最小日均成交: 1000000      # 港元，烟蒂股底线
  最小市值: 500000000       # 5亿港元，流动性底线
  紧急卖出天数: 3           # 必须在3天内能卖出
  
  流动性评级:
    优秀: { min_volume: 5000000, max_position: 0.10 }   # 日成交>500万
    良好: { min_volume: 1000000, max_position: 0.05 }   # 日成交>100万
    较差: { min_volume: 300000, max_position: 0.03 }    # 日成交>30万
    避免: { min_volume: 0, max_position: 0.00 }         # 日成交<30万

# ==================== 汇率风险 ====================
currency_risk:
  港币资产上限: 0.80         # 预留20%人民币对冲
  单一非港币货币上限: 0.20  # 如美元资产
  汇率对冲触发点: 0.05      # 汇率波动>5%时考虑对冲

# ==================== 市场整体风控 ====================
market_risk:
  总仓位上限: 0.90           # 保留10%现金
  单一市场上限: 0.70         # 如港股不超过70%
  现金储备下限: 0.10         # 至少保留10%现金
  
  极端行情应对:
    恒指跌幅>20%: "暂停买入，评估持仓"
    恒指跌幅>30%: "启用备用资金，逐步加仓"
    个股跌幅>50%: "深度复盘，确认是否止损"
  
  # 主锚：港股本地情绪监控（V5.5.13新增）
  vhsi_monitoring:
    数据源: "港交所 VHSI (^VHSI)"
    更新频率: "每日收盘后"
    
    levels:
      平静期:
        vhsi_max: 22
        action: "正常执行选股标准"
        cash_reserve_min: 0.10
        
      谨慎期:
        vhsi_range: [22, 27]
        action: "收紧买入标准，只买核心仓位标的"
        cash_reserve_min: 0.15
        position_adjustment: "卫星仓位减半"
        
      恐慌期:
        vhsi_range: [27, 32]
        action: "暂停新建仓，仅加仓🟢低风险标的"
        cash_reserve_min: 0.20
        position_adjustment: "较高风险标的减仓50%"
        valuation_filter: "仅净现金>市值40% 或 FCF<2.5倍"
        
      高度恐慌期:
        vhsi_range: [32, 40]
        action: "全面评估持仓，高风险标的强制清仓"
        cash_reserve_min: 0.25
        position_adjustment: "中风险及以上标的减仓20-50%"
        
      极端恐慌期:
        vhsi_min: 40
        action: "逐步加仓成长股（仅限卫星仓位3-5%），执行防御→成长切换"
        cash_reserve_min: 0.15
        position_adjustment: "仅保留🟢低风险标的+现金，其余切换"
        switch_target: "跌幅>60%的科技龙头、10倍PE以下成长股"

  # 辅锚：美股恐慌指数（全球系统性风险参考）
  vix_monitoring:
    数据源: "CBOE (^VIX)"
    更新频率: "每日收盘后"
    作用: "辅助判断是否为全球性恐慌"
    联动规则:
      vhsi高+vix高: "全球同步恐慌，保守应对"
      vhsi高+vix低: "港股独立恐慌，可能存在独立抄底机会"
      vhsi低+vix高: "美股独慌，港股观望"

# ==================== 标的质量红线 ====================
quality_red_lines:
  禁止买入:
    - "有息负债率 > 100%"    # 资不抵债
    - "连续3年经营现金流为负"
    - "审计报告非标意见"
    - "停牌超过3个月"
    - "日均成交 < 30万港元"
    
  谨慎买入:
    - "有息负债率 > 50%"
    - "派息率 > 80%"
    - "大股东质押率 > 50%"
    - "现金余额连续2年下降"

# ==================== 用户当前约束 ====================
user_constraints:
  总资金: "十来万"
  港股通门槛: 500000        # 50万门槛暂未达到
  计划开通: "香港银行卡"
  当前可投资:
    - "A股银行股（农业银行601288.SH等）"
    - "港股通标的（待开通）"
    - "纯港股烟蒂股（需香港卡）"
